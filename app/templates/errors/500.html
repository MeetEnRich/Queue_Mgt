{% extends "base.html" %}

{% block title %}500 — Server Error | FULafia DQMS{% endblock %}

{% block content %}
<section class="error-page">
    <div class="error-card glass-card animate-fade-in">
        <div class="error-card__code">500</div>
        <h1 class="error-card__title">Something Went Wrong</h1>
        <p class="error-card__text">
            An unexpected error occurred. Our team has been notified. Please try again later.
        </p>
        <a href="{{ url_for('main.office_directory') }}" class="btn btn--primary">
            &larr; Go Home
        </a>
    </div>
</section>
{% endblock %}
