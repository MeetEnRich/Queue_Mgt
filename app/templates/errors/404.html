{% extends "base.html" %}

{% block title %}404 — Page Not Found | FULafia DQMS{% endblock %}

{% block content %}
<section class="error-page">
    <div class="error-card glass-card animate-fade-in">
        <div class="error-card__code">404</div>
        <h1 class="error-card__title">Page Not Found</h1>
        <p class="error-card__text">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <a href="{{ url_for('main.office_directory') }}" class="btn btn--primary">
            &larr; Go Home
        </a>
    </div>
</section>
{% endblock %}
